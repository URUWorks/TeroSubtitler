---
name: Make

on:
  schedule:
    - cron: '0 0 1 * *'
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

jobs:
  make:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Build on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: source '.github/workflows/make.sh'

      - name: Build on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: pwsh -File '.github/workflows/make.ps1'
